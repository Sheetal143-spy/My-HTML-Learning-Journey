<!DOCTYPE html>  <!-- 1. Browser ko batata hai ki yeh HTML5 ka modern code hai -->
<html lang="en"> <!-- 2. Website ki language english set karta hai -->
<head>
    <meta charset="UTF-8"> <!-- 3. Website par har tarah ke symbols aur characters ko sahi se dikhata hai -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- 4. Website ko mobile aur laptop dono par fit (Responsive) karta hai -->
    
    <title>My Website</title> <!-- 5. Browser ke tab par jo naam dikhta hai, wo yahan se badla jata hai -->
</head>
<body>

    <!-- 6. Website par jo kuch bhi dikhana hai (Text, Image, Buttons), wo sab is body tag ke andar aayega -->

</body>
</html>
