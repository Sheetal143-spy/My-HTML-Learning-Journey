<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Blocks Elements</title>
</head>
<body>
    <!-- Inline HTML code -->
    <strong style="border:2px solid red">This is a Inline Element</strong>
    <a style="border:2px solid blue">This is a Inline Element</a>
    <span style="border:2px solid green">This is a Inline Element</span>
    <img src="image.jpg" style="display:inline;" alt="My Image">
    <p>Aaj ka mausam bahut <em>suhana</em> aur thanda hai.</p>
     <!-- Block Elements HTML Code -->
   <ul>
    <li style="display: block; background: lightgray; margin-bottom: 5px;">Item 1</li>
    <li style="display: block; background: lightgray;"">Item 2</li>
   </ul> 
    <div style="border:2px solid black">This is a Block Element</div>
    <ul style="border: 2px solid red; padding: 20px;">
      <li>Yeh poora box ek block hai</li>  
    </ul>
    <p>Yeh normal text hai.</p>
    <!-- em tag by default ek inline elements hai per use kaise block elements banana hai -->
     <!-- em ko block banane se yeh naye line mein chala jayega -->
     <em style="display: block; background: yellow; padding: 5px;">Yeh text ab ek block element ban chuka hai.</em>
     <p>Yeh uske neeche ka text hai.</p>
</body>
</html>
